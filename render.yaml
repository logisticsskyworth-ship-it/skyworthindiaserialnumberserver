services:
  - type: web
    name: serial-consolidator-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATA_DIR
        value: /data
      - key: PYTHON_VERSION
        value: 3.11.9
    disk:
      name: serial-data
      mountPath: /data
      sizeGB: 1
